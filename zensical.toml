[project]
site_name = "Стандарты разработки 1С"
site_url = "https://v8std.ru"
site_author = "Igor Apresov"
site_description = "Система стандартов и методик разработки конфигураций для платформы 1С:Предприятие 8."
repo_name = "zeegin/v8std"
repo_url = "https://github.com/zeegin/v8std"
edit_uri = "edit/main/docs"
copyright = "No Rights Reserved <a href=\"https://creativecommons.org/publicdomain/zero/1.0/deed.ru\">CREATIVE COMMONS CC0</a>"
extra_css = [
    "assets/stylesheets/extra.css",
    "assets/stylesheets/monokai.css",
]
extra_javascript = [
    "assets/javascripts/announce.js",
    "assets/javascripts/home-search.js",
]

[project.theme]
variant = "classic"
custom_dir = "overrides"
language = "ru"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.footer",
    "navigation.indexes",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.share",
    "search.suggest",
]
logo = "assets/images/logo.png"
favicon = "assets/images/logo.png"

[[project.theme.palette]]
media = "(prefers-color-scheme)"

[project.theme.palette.toggle]
icon = "material/brightness-auto"
name = "Автоматически"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "blue"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Выключить свет"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "light blue"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Включить свет"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "material/file-edit-outline"
view = "material/file-eye-outline"

[project.extra]
social = [
    { icon = "fontawesome/brands/github", link = "https://github.com/zeegin/v8std" },
    { icon = "fontawesome/brands/telegram", link = "https://t.me/v8std" },
]

[project.extra.consent]
title = "Cookie"
description = "Мы используем файлы cookie для распознавания ваших повторных посещений и предпочтений, а также для оценки эффективности нашей документации и того, находят ли пользователи то, что ищут. С вашего согласия вы помогаете нам сделать нашу документацию лучше."

[project.extra.consent.cookies]
analytics = "Yandex.Metrika"

